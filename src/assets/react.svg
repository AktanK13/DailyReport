<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  width="64"
  height="64"
>
  <!-- Background circle -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2AABEE" />
      <stop offset="100%" stop-color="#229ED9" />
    </linearGradient>
  </defs>

  <circle cx="32" cy="32" r="30" fill="url(#bg)" />

  <!-- Paper/clipboard -->
  <rect
    x="18"
    y="16"
    width="28"
    height="32"
    rx="4"
    ry="4"
    fill="#ffffff"
    fill-opacity="0.96"
  />

  <!-- Top bar -->
  <rect x="22" y="18" width="20" height="4" rx="2" fill="#e3f4ff" />

  <!-- Checkmarks lines -->
  <circle cx="23" cy="28" r="2" fill="#00c853" />
  <rect x="28" y="27" width="14" height="2" rx="1" fill="#b0c7e6" />

  <circle cx="23" cy="35" r="2" fill="#00c853" />
  <rect x="28" y="34" width="14" height="2" rx="1" fill="#b0c7e6" />

  <circle cx="23" cy="42" r="2" fill="#ffb300" />
  <rect x="28" y="41" width="14" height="2" rx="1" fill="#b0c7e6" />
</svg>